  #   image: ghcr.io/lamblackout/msgnn-calculator-app:latest
  #   container_name: msg-app
  #   restart: unless-stopped
  #   environment:
  #     NODE_ENV: production
  #     PORT: 3000
  #     ORIGIN: https://app.msgzakupki.ru
  #     SUPABASE_URL: ${SUPABASE_URL}
  #     SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
  #     SUPABASE_SERVICE_ROLE_KEY_FILE: /run/secrets/supabase_service_role
  #   secrets:
  #     - supabase_service_role
  #   networks:
  #     - msg-net
  #   healthcheck:
  #     test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/healthcheck"]
  #     interval: 30s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 30s
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 512M

volumes:
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  pg_n8n_data:
    driver: local
  n8n_data:
    driver: local

networks:
  msg-net:
    driver: bridge

secrets:
  pg_password:
    file: ./secrets/pg_password.txt
  n8n_encryption_key:
    file: ./secrets/n8n_encryption_key.txt
  # supabase_service_role:
  #   file: ./secrets/supabase_service_role.txt
